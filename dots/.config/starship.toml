#  
# (bg:#e2dbc9 fg:#1e1c1b)

[conda]
format = 'Óúľ $environment'


[directory]
# style = "fg:#1e1c1b bg:#e2dbc9"
style = "fg:#e2dbc9"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

[git_branch]
symbol = "Ôźė"
style = "fg:#e2dbc9" 
# style = "bg:#1e1c1b"
format = '[[ $symbol $branch ](fg:#e2dbc9)]($style)'

[git_status]
# style = "bg:#1e1c1b"
style = "fg:#e2dbc9"
format = '[[($all_status$ahead_behind )](fg:#e2dbc9)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
# style = "bg:#1e1c1b"
format = '[[ Ôźļ $time ](fg:#e2dbc9 bg:#1e1c1b)]($style)'
